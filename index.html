<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Bar BH - Comida di Buteco 2025</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #infobox {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 20px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.2);
            display: none; z-index: 1000;
        }
        .btn-rota {
            background: #e72929; color: white; border: none;
            padding: 15px; border-radius: 12px;
            font-weight: bold; width: 100%; cursor: pointer;
            font-size: 16px; margin-top: 10px;
        }
        h2 { margin: 0; color: #2c3e50; font-size: 18px; }
        p { margin: 5px 0; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="infobox">
        <h2 id="bar-nome"></h2>
        <p id="bar-prato"></p>
        <p id="bar-end" style="font-size: 12px; color: #888;"></p>
        <button class="btn-rota" onclick="abrirGPS()">TRAÇAR ROTA NO MAPS</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // LISTA AMPLIADA DE BARES - BH 2025
        const baresBH = [
            { nome: "222", prato: "Cumbuca de Carne de Sol", end: "Rua Francisco Deslandes, 222 - Anchieta", lat: -19.94578, lng: -43.92848 },
            { nome: "Alexandre's Bar", prato: "Petisco do Alexandre", end: "Rua David Alves do Vale, 68 - Itapoã", lat: -19.86312, lng: -43.95462 },
            { nome: "Andrade's Beer", prato: "Sabor Mineiro", end: "Rua Dona Geni, 32 - Maria Helena", lat: -19.79634, lng: -44.00456 },
            { nome: "Armazém Santa Amélia", prato: "Costelinha Embriagada", end: "Av. Sinfonia, 253 - Santa Amélia", lat: -19.85123, lng: -43.98741 },
            { nome: "Bar do Magrelo", prato: "Canela Suada", end: "Rua São Felipe, 21 - Sagrada Família", lat: -19.92312, lng: -43.92345 },
            { nome: "Bar Bambú", prato: "Camarão que dorme?", end: "Rua Divisa Nova, 670 - Salgado Filho", lat: -19.9389, lng: -43.9721 },
            { nome: "Bar do Dodô", prato: "Fígado com Jiló", end: "Rua Santo Elias, 39 - Santa Tereza", lat: -19.9172, lng: -43.9156 },
            { nome: "Buteco do Maranhão", prato: "Carne de Lata", end: "Rua Erê, 150 - Prado", lat: -19.9298, lng: -43.9612 },
            { nome: "Bar da Lora", prato: "Pé de Porco", end: "Mercado Central - Centro", lat: -19.9229, lng: -43.9341 },
            { nome: "Quintal do Louzada", prato: "Charuteco Caipira", end: "Rua Gávea, 358 - Nova Suissa", lat: -19.9351, lng: -43.9688 },
            { nome: "Café Palhares", prato: "KAOL", end: "Rua dos Tupinambás, 638 - Centro", lat: -19.9168, lng: -43.9372 },
            { nome: "Mamute Bar", prato: "Petisco Mamute", end: "Rua Paracatu, 1099 - Santo Agostinho", lat: -19.9285, lng: -43.9501 }
            // Continue adicionando os bares do seu PDF aqui
        ];

        const map = L.map('map', { zoomControl: false }).setView([-19.9322, -43.9378], 12);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Ícone usando o nome EXATO que está no seu GitHub agora
        const rotaIcon = L.icon({
            iconUrl: 'Rota-Logo4.jpg', 
            iconSize: [35, 35],
            iconAnchor: [17, 35],
            popupAnchor: [0, -35]
        });

        let enderecoAtual = "";

        baresBH.forEach(bar => {
            const marker = L.marker([bar.lat, bar.lng], { icon: rotaIcon }).addTo(map);
            marker.on('click', () => {
                document.getElementById("bar-nome").innerText = bar.nome;
                document.getElementById("bar-prato").innerHTML = "<b>Prato:</b> " + bar.prato;
                document.getElementById("bar-end").innerText = bar.end;
                document.getElementById("infobox").style.display = "block";
                enderecoAtual = bar.end + ", Belo Horizonte, MG";
            });
        });

        map.on('click', () => { document.getElementById("infobox").style.display = "none"; });

        function abrirGPS() {
            if (enderecoAtual !== "") {
                window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(enderecoAtual), '_blank');
            }
        }
    </script>
</body>
</html>
