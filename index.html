<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Bar BH - Comida di Buteco 2025</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        #infobox {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
        }

        .btn-rota {
            background: #e72929;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 18px;
        }

        p {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="infobox">
        <h2 id="bar-nome"></h2>
        <p id="bar-prato"></p>
        <p id="bar-end" style="font-size: 12px; color: #888;"></p>
        <button class="btn-rota" onclick="abrirGPS()">TRAÇAR ROTA</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="dados_bares.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([-19.9322, -43.9378], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const rotaIcon = L.icon({
            iconUrl: 'https://i.ibb.co/Lhb8mCj/Rota-Logo4.jpg',
            iconSize: [35, 35],
            iconAnchor: [17, 35],
            popupAnchor: [0, -35]
        });

        let enderecoAtual = "";

        // Carrega os bares do arquivo externo
        baresBH.forEach(bar => {
            const marker = L.marker([bar.lat, bar.lng], { icon: rotaIcon }).addTo(map);
            marker.on('click', () => {
                document.getElementById("bar-nome").innerText = bar.nome;
                document.getElementById("bar-prato").innerHTML = "<b>Prato:</b> " + bar.prato;
                document.getElementById("bar-end").innerText = bar.end;
                document.getElementById("infobox").style.display = "block";
                enderecoAtual = bar.end + ", Belo Horizonte, MG";
            });
        });

        map.on('click', () => { document.getElementById("infobox").style.display = "none"; });

        function abrirGPS() {
            window.open("https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(enderecoAtual));
        }
    </script>
</body>

</html>
