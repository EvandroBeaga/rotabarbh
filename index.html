<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Bar BH 2026 - Completo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        #infobox {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 20px; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2); display: none; z-index: 1000;
        }
        .btn-rota {
            background: #e72929; color: white; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="infobox">
        <h2 id="bar-nome"></h2>
        <p id="bar-prato" style="color: #e72929; font-weight: bold;"></p>
        <p id="bar-end" style="font-size: 13px; color: #666;"></p>
        <button class="btn-rota" onclick="abrirGPS()">TRAÇAR ROTA NO GOOGLE MAPS</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // LISTA DE BARES 2026 (Exemplo de estrutura para os 128 bares)
        const baresBH = [
            { nome: "222", prato: "Cumbuca de Carne de Sol 2026", end: "R. Francisco Deslandes, 222, Cruzeiro", lat: -19.94578, lng: -43.92848 },
            { nome: "Alexandre's Bar", prato: "Petisco Alexandre 2026", end: "R. David Alves do Vale, 68, Santa Rosa", lat: -19.86312, lng: -43.95462 },
            { nome: "Andrade's Beer", prato: "Sabor Mineiro 2026", end: "R. Dona Geni, 32, Maria Helena", lat: -19.79634, lng: -44.00456 },
            { nome: "Mamute Bar", prato: "Petisco Mamute 2026", end: "Rua Paracatu, 1099, Santo Agostinho", lat: -19.9287, lng: -43.9482 },
            { nome: "Café Palhares", prato: "KAOL Especial 2026", end: "Rua dos Tupinambás, 638, Centro", lat: -19.9172, lng: -43.9378 }
            // Adicione os restantes bares conforme a lista PDF/TXT enviada anteriormente
        ];

        const map = L.map('map', { zoomControl: false }).setView([-19.9322, -43.9378], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // CONFIGURAÇÃO DO ÍCONE COM TRATAMENTO DE ERRO
        const rotaIcon = L.icon({
            iconUrl: 'Rota-Logo4.jpg', 
            iconSize: [40, 40],
            iconAnchor: [20, 40]
        });

        let enderecoAtual = "";

        baresBH.forEach(bar => {
            // Se a imagem falhar, o Leaflet pode não mostrar o marcador. 
            // Adicionamos o marcador e capturamos cliques.
            const marker = L.marker([bar.lat, bar.lng], { icon: rotaIcon }).addTo(map);
            
            marker.on('click', () => {
                document.getElementById("bar-nome").innerText = bar.nome;
                document.getElementById("bar-prato").innerText = "Prato: " + bar.prato;
                document.getElementById("bar-end").innerText = "Endereço: " + bar.end;
                document.getElementById("infobox").style.display = "block";
                enderecoAtual = bar.end + ", Belo Horizonte, MG";
            });
        });

        map.on('click', () => { document.getElementById("infobox").style.display = "none"; });

        function abrirGPS() {
            if (enderecoAtual) window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(enderecoAtual), '_blank');
        }
    </script>
</body>
</html>
