<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Bar BH 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #f0f0f0; }
        #map { height: 100vh; width: 100vw; }
        #search-container { position: fixed; top: 10px; left: 10px; right: 10px; z-index: 3000; max-width: 500px; margin: auto; }
        #search-input { width: 100%; padding: 15px 20px; border-radius: 30px; border: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); font-size: 16px; outline: none; box-sizing: border-box; }
        #results-list { background: white; border-radius: 15px; margin-top: 5px; max-height: 250px; overflow-y: auto; display: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); padding: 0; list-style: none; }
        #results-list li { padding: 12px 20px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        #results-list li:hover { background: #f9f9f9; }
        #infobox { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 25px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.3); display: none; z-index: 2000; }
        .btn-rota { background: #e72929; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; color: #ccc; }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Buscar bar, rua ou região...">
        <ul id="results-list"></ul>
    </div>

    <div id="map"></div>

    <div id="infobox">
        <span class="close-btn" onclick="fecharBox()">×</span>
        <h2 id="bar-nome"></h2>
        <p id="bar-prato" style="color: #e72929; font-weight: bold; margin: 8px 0;"></p>
        <p id="bar-end" style="font-size: 14px; color: #666; line-height: 1.4;"></p>
        <button class="btn-rota" onclick="abrirGPS()">TRAÇAR ROTA NO MAPS</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Lista corrigida (Exemplo com correções de sintaxe)
        const baresBH = [
    { nome: "222", prato: "Buraquim quente", end: "Rua Francisco Deslandes, 222, Cruzeiro", lat: -19.945424, lng: -43.929774 },
    { nome: "Alexandre's Bar", prato: "Amostarda", end: "Rua David Alves do Vale, 68, Santa Rosa", lat: -19.861666, lng: -43.944401 },
    { nome: "Andrade's Beer", prato: "Ossadinha Atolada", end: "Rua Dona Geni, 32, Maria Helena", lat: -19.800379, lng: -43.996560 },
    { nome: "Armazém Santa Amélia ", prato: "Chucrute de Mineiro", end: "Rua da Sinfonia, 253, Santa Amélia", lat: -19.832577, lng: -43.973266 },
    { nome: "Seu Justino", prato: "Rolê do Justino", end: "Rua Dona Conceição Martins, 63", lat: -19.802221, lng: -43.997485 }
];
        const map = L.map('map', { zoomControl: false }).setView([-19.9322, -43.9378], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const rotaIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png', // Substitua pela sua Rota-Logo4.png
            iconSize: [35, 35],
            iconAnchor: [17, 35]
        });

        const markers = {};
        let enderecoDestino = "";

        baresBH.forEach((bar, index) => {
            if (bar.lat && bar.lng) {
                const marker = L.marker([bar.lat, bar.lng], { icon: rotaIcon }).addTo(map);
                markers[index] = marker;
                marker.on('click', () => exibirBar(bar, marker));
            }
        });

        function exibirBar(bar, marker) {
            document.getElementById("bar-nome").innerText = bar.nome;
            document.getElementById("bar-prato").innerText = "🍽️ " + bar.prato;
            document.getElementById("bar-end").innerText = "📍 " + bar.end;
            document.getElementById("infobox").style.display = "block";
            enderecoDestino = bar.end + ", Belo Horizonte, MG";
            map.setView(marker.getLatLng(), 16);
            fecharBusca();
        }

        const searchInput = document.getElementById('search-input');
        const resultsList = document.getElementById('results-list');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            resultsList.innerHTML = '';
            if (term.length < 2) { resultsList.style.display = 'none'; return; }

            const filtered = baresBH.filter(bar => 
                bar.nome.toLowerCase().includes(term) || bar.end.toLowerCase().includes(term)
            );

            if (filtered.length > 0) {
                resultsList.style.display = 'block';
                filtered.forEach(bar => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${bar.nome}</strong><br><small>${bar.end}</small>`;
                    li.onclick = () => {
                        const originalIndex = baresBH.indexOf(bar);
                        exibirBar(bar, markers[originalIndex]);
                    };
                    resultsList.appendChild(li);
                });
            } else {
                resultsList.style.display = 'none';
            }
        });

        function fecharBox() { document.getElementById("infobox").style.display = "none"; }
        function fecharBusca() { resultsList.style.display = 'none'; }
        
        function abrirGPS() {
            if (enderecoDestino) {
                window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(enderecoDestino), '_blank');
            }
        }

        map.on('click', () => { fecharBox(); fecharBusca(); });
    </script>
</body>
</html>
