    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #f0f0f0;
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }

        #search-container {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 3000;
            max-width: 500px;
            margin: auto;
        }

        #search-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        #results-list {
            background: white;
            border-radius: 15px;
            margin-top: 5px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            padding: 0;
            list-style: none;
        }

        #results-list li {
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        #results-list li:hover {
            background: #f9f9f9;
        }

        #infobox {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 25px;
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 2000;
        }

        .btn-rota {
            background: #e72929;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #ccc;
        }
    </style>
</head>

        let enderecoDestino = "";

        // Adiciona os marcadores
        baresBH.forEach((bar, index) => {
            if (bar.lat && bar.lng) {
                const marker = L.marker([bar.lat, bar.lng], { icon: rotaIcon }).addTo(map);
                markers[index] = marker;
                marker.on('click', () => exibirBar(bar, marker));
            }
        });

        function exibirBar(bar, marker) {
            document.getElementById("bar-nome").innerText = bar.nome;
            document.getElementById("bar-prato").innerText = "🍽️ " + bar.prato;
            document.getElementById("bar-end").innerText = "📍 " + bar.end;
            document.getElementById("infobox").style.display = "block";
            enderecoDestino = bar.end + ", Belo Horizonte, MG";
            map.setView(marker.getLatLng(), 16);
            fecharBusca();
        }

        const searchInput = document.getElementById('search-input');
        const resultsList = document.getElementById('results-list');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            resultsList.innerHTML = '';
            if (term.length < 2) { resultsList.style.display = 'none'; return; }

            const filtered = baresBH.filter(bar =>
                bar.nome.toLowerCase().includes(term) || bar.end.toLowerCase().includes(term)
            );

            if (filtered.length > 0) {
                resultsList.style.display = 'block';
                filtered.forEach(bar => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${bar.nome}</strong><br><small>${bar.end}</small>`;
                    li.onclick = () => {
                        const originalIndex = baresBH.indexOf(bar);
                        exibirBar(bar, markers[originalIndex]);
                        searchInput.value = bar.nome;
                    };
                    resultsList.appendChild(li);
                });
            } else {
                resultsList.style.display = 'none';
            }
        });

        function fecharBox() { document.getElementById("infobox").style.display = "none"; }
        function fecharBusca() { resultsList.style.display = 'none'; }

        function abrirGPS() {
            if (enderecoDestino) {
                // LINK CORRIGIDO AQUI:
                window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(enderecoDestino), '_blank');
            }
        }

        map.on('click', () => { fecharBox(); fecharBusca(); });
    </script>
</body>

</html>
